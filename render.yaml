services:
  - type: web
    name: proshare-backend
    env: node
    plan: free
    buildCommand: cd Backend && npm install && npm run build
    startCommand: cd Backend && npm run start:prod
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: proshare-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: FRONTEND_URL
        value: https://proshare333-frontend-ysbq.vercel.app
      - key: NODE_ENV
        value: production

databases:
  - name: proshare-db
    plan: free
    databaseName: proshare
    user: proshare_admin
